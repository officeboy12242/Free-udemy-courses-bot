services:
  # OPTION: Change this to run stream_server.py if you want THIS URL to handle /search
  # Current: Runs main bot (market tracker)
  # To fix: Change startCommand to "python stream_server.py" and add API_ID, API_HASH, STREAM_BOT_TOKEN, STREAM_CHANNEL_ID to envVars
  - type: web
    name: telegram-course-bot
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: python stream_server.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: STREAM_BOT_TOKEN
        sync: false
      - key: STREAM_CHANNEL_ID
        sync: false
      - key: PORT
        value: "10000"
    autoDeploy: true
